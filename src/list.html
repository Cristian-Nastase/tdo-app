<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDO! | listName</title>
    <link rel="icon" type="image/x-icon" href="assets/images/icon.svg">
    <link href="css/list.css" rel="stylesheet" />

    <script type="module" src="scripts/list/listLogic.js"></script>
    <script type="module" src="scripts/list/listFormLogic.js"></script>
    <script type="module" src="scripts/components/taskComponent.js"></script>
    <script type="module" src="scripts/state.js"></script>
</head>

<body>
    <header>
        <nav class="nav" aria-label="Main nav">
            <div class="nav__logo">
                <img class="nav__icon" src="assets/images/icon-transparent.svg" alt="icon" loading="eager" width="32" height="32"/>
                <p class="nav__name">TDO!</p>
            </div>
            
            <div class="spacer"></div>

            <ul class="nav__links">
                <li class="nav__link nav__link--home"><a href="index.html">Home</a></li>
                <li class="nav__link nav__link--support"><a href="https://github.com/Cristian-Nastase/tdo-app" target="_blank">Support</a></li>
                <li class="nav__link nav__link--contact"><a href="https://github.com/Cristian-Nastase/tdo-app" target="_blank">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main id="main">
        <section class="list">
            <div class="list__wrapper"> 
                <h1 class="list__title">facultate</h1>
                <p class="list__description">No description</p>
            </div>
            <div class="list__container" aria-live="polite"></div>
            <button type="button" class="list__create">Add new task</button>
        </section>
    </main>

    <section class="prompt" aria-labelledby="prompt-header">
        <h2 id="prompt-header" class="promp__header">enter a command</h2>
        <input class="prompt__line" />
        <div class="prompt__suggestions"></div>
    </section>

    <dialog id="task-dialog" class="dialog" aria-label="Create a new task">
        <button type="button" class="dialog__close" aria-label="Close dialog">
            <img src="assets/images/x.svg" alt="close">
        </button>

        <form id="task-form" class="form">

            <label for="form-title" class="form__field">
                <span class="form__label">Name *</span>
                <input autofocus class="form__input" id="form-title" type="text" required name="title" autocomplete="off" placeholder="Enter a name.."/>
                <span class="form__error">Enter a task name</span>
            </label>

            <label for="form-description" class="form__field">
                <span class="form__label">Description</span>
                <textarea id="form-description" class="form__textarea" placeholder="Enter a description.." name="description"></textarea>
            </label>

            <button type="submit" class="form__submit" aria-label="Create task">Create task</button>
        </form>
    </dialog>

    <template id="task">
        <style>
            input {
                transition: outline 0.2s;
            }

            input:focus-visible {
                outline: 4px solid var(--yellow-400);
                outline-offset: 5px;
            }

            :host {
                position: relative;
                height: fit-content;
                min-height: fit-content;
                display: flex;
                flex-direction: column;
                gap: var(--spacing-100);
            }

            .task__layout {
                display: flex;
                align-items: center;
                gap: var(--spacing-200);
                background-color: var(--gray-900);
                color: var(--text-color);
                border-radius: 20px;
                padding: var(--spacing-100) var(--spacing-200);
                transition: box-shadow 0.2s;
            }

            .task__body {
                flex: 1;
                display: flex;
                align-items: center;
                gap: var(--spacing-200);
                padding: var(--spacing-100) var(--spacing-200);
            }

            
            .task__layout:hover {
                box-shadow: 0px 0px 8px 1px hsl( from var(--yellow-400) h s l / 0.7);
            }

            .task__wrapper {
                display: flex;
                gap: var(--spacing-200);
                align-items: center;
            }

            .task__wrapper:hover {
                cursor: pointer;
            }

            .task__input {
                margin-inline-start: var(--spacing-200);
                width: var(--spacing-400);
            }

            .task__input:hover {
                cursor: pointer;
            }
            
            input[type="checkbox"] {
                display: grid;
                place-items: center;
                appearance: none;
                width: 40px;
                height: 40px;
                background-color: var(--gray-200);
                border-radius: 12px;
                transition: background-color 0.4s;
            }

            input[type="checkbox"]:checked {
                background-color: var(--yellow-400);
            }

            input[type="checkbox"]:checked::before {
                content:'';
                width: 100%;
                aspect-ratio: 1/1;
                background: url(assets/images/check.svg) center no-repeat;
                animation: check-appear 0.2s;
            }

            @keyframes check-appear {
                0% {
                    opacity: 0;
                    transform: translateX(-200%);
                }

                100% {
                    opacity: 1;
                    transform: translateX(0%);
                }
            }

            .task__label {
                flex: 1;
                max-width: clamp(5ch, 30vw, 30ch);
                word-wrap: break-word;
                font-weight: 200;
                font-size: var(--big-font);
                transition: color 0.4s, text-decoration 0.4s;
            }

            .task__input:checked + .task__label {
                color: var(--yellow-400);
                text-decoration: line-through;
            }
            
            .task__settings {
                justify-self: end;
                width: 50px;
                height: 50px;
                display: grid;
                place-items: center;
                border: 0;
                background-color: transparent;
            }

            .task__settings {
                cursor: pointer;
            }

            .task__menu {
                width: 100%;
                display: flex;
                flex-direction: column;
                animation: appear-accordion 0.2s;
                transform-origin: top center;
            }

            .task__menu.hidden {
                animation: disappear-accordion 0.2s;
            }

            @keyframes appear-accordion {
                0% {
                    transform: scaleY(0);
                }

                100% { 
                    transform: scaleY(1);
                }
            }

            @keyframes disappear-accordion {
                0% {
                    display: block;
                    transform: scaleY(1);
                }
                
                100% { 
                    transform: scaleY(0);
                }
            }

            .task__button {
                display: flex;
                flex-direction: row;
                flex: 1;

                gap: var(--spacing-200);
                padding: 0 var(--spacing-200);
                margin-inline-start: var(--spacing-200);
                border-width: 0px;
                border-color: var(--gray-200);
                border-radius: 20px;
                background-color: var(--gray-900);
                color: var(--gray-200);
                font-family: "Lexend Deca";
                font-weight: 300;
                font-size: var(--xsmall-font);
                transition: box-shadow 0.2s;
            }

            .task__button:hover {
                cursor: pointer;
                box-shadow: 0px 0px 10px 1px hsl( from var(--yellow-400) h s l / 0.7);
            }

            .task__icon {
                background: transparent;
                width: 32px;
                aspect-ratio: 1/1;
            }

            .hidden {
                display: none;
            }
        </style>
        <div class="task__layout">
            <div class="task__body">
                <label class="task__wrapper">
                    <input role="checkbox" type="checkbox" class="task__input" aria-label="Check task">
                    <span class="task__label">
                        <slot class="task__label" name="title"></slot>
                    </span>
                </label>
            </div>

            <button class="task__settings" type="button" aria-label="Open settings">
                <img src="assets/images/settings.svg" alt="settings">
            </button>
        </div>
        <div class="task__menu hidden" aria-expanded="false">
            <button class="task__button task__button--remove" type="button" aria-label="Delete task">
                <img class="task__icon" src="assets/images/trash.svg" alt="remove" />
                <p class="task__option">Remove</p>
            </button>
        </div>
    </template>
</body>
</html>
