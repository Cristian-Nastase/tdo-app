<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDO! - build it.</title>
    <link href="style.css" rel="stylesheet" />

    <script type="module" src="Scripts/listLogic.js" defer></script>
    <script type="module" src="Scripts/listFormLogic.js" defer></script>
    <script type="module" src="Scripts/Components/taskComponent.js" defer></script>
</head>

<body>
    <header>
        <nav class="nav">
            <ul class="nav__links">
                <li class="nav__link nav__link--home"><a href="#main">Home</a></li>
                <li class="nav__link nav__link--support"><a href="">Support</a></li>
                <li class="nav__link nav__link--contact"><a href="">Contact</a></li>
            </ul>
        </nav>
    </header>
    <!-- <img src="Assets/Images/p-svg.png" alt="svg" style="position: absolute; top: 0; left: 0; z-index: -100;"> -->
    <main id="main">
        <section class="list">
            <div class="list__wrapper">
                <h1 class="list__title">facultate</h1>
                <p class="list__description">No description</p>
            </div>
            <div class="list__container" aria-live="polite"></div>
            <button type="button" class="list__create">Add new task</button>
        </section>
    </main>

    <section class="prompt">
        <input class="prompt__line" />
        <div class="prompt__suggestions"></div>
    </section>

    <dialog id="task-dialog" class="dialog">
        <button type="button" class="dialog__close" aria-label="Close dialog">X</button>

        <form id="task-form" class="form">

            <label for="form-title" class="form__field">
                <span class="form__label">Name *</span>
                <input autofocus class="form__input" id="form-title" type="text" required name="title" autocomplete="off" placeholder="Enter a name.."/>
                <span class="form__error">Enter a task name</span>
            </label>

            <label for="form-description" class="form__field">
                <span class="form__label">Description</span>
                <textarea id="form-description" class="form__textarea" placeholder="Enter a description.." name="description"></textarea>
            </label>

            <button type="submit" class="form__submit">Create task</button>
        </form>
    </dialog>

    <template id="task">
        <style>
            :host {
                height: fit-content;
                min-height: fit-content;
                display: flex;
                gap: var(--spacing-200);
                background-color: var(--gray-900);
                color: var(--text-color);
                border-radius: 20px;
                padding: 0 var(--spacing-200);
            }

            .task__input {
                margin-inline-start: var(--spacing-200);
                width: var(--spacing-400);
            }

            .task__input:hover {
                cursor: pointer;
            }

            .task__input:checked + .task__header {
                text-decoration: line-through;
            }

            .task__header {
                max-width: clamp(5ch, 50%, 40ch);
                word-wrap: break-word;
                font-weight: 200;
            }
        </style>
        <input type="checkbox" class="task__input" aria-label="Check task">
        <h2 class="task__header">
            <slot name="title"></slot>
        </h2>
    </template>
</body>
</html>
